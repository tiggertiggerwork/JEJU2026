<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Jeju～</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF9E66; /* 柔和橙色 */
            --primary-light: #FFF2EB;
            --bg-warm: #F7F6F3; /* 暖灰背景 */
            --white: #FFFFFF;
            --text-dark: #4A4A4A;
            --text-muted: #8E8E93;
            --radius-lg: 20px; /* 日式大圓角 */
            --radius-md: 14px;
            --shadow: 0 8px 24px rgba(0,0,0,0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Zen Maru Gothic', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-warm);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 手機容器 */
        .phone-container {
            width: 100%;
            max-width: 430px; 
            background-color: var(--bg-warm);
            min-height: 100vh;
            position: relative;
            padding-bottom: 100px; 
            display: flex;
            flex-direction: column;
        }

        /* --- Header 指定背景圖片 --- */
        .header {
            height: 180px;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('https://a.ksd-i.com/a/2020-09-11/130008-872800.jpeg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            color: var(--white);
            border-bottom-left-radius: var(--radius-lg);
            border-bottom-right-radius: var(--radius-lg);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* --- 主內容區 --- */
        .content-section {
            padding: 16px;
            display: none; 
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 卡片樣式 --- */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            position: relative;
            border: 1px solid rgba(255, 158, 102, 0.1);
        }

        .card.pinned {
            border: 2px solid var(--primary);
            background: #FFFBF9;
        }

        .card-close-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 24px;
            height: 24px;
            background: #F2F2F7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            border: none;
            z-index: 10;
        }

        .drag-controls {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            border-top: 1px dashed #EEE;
            padding-top: 8px;
            flex-wrap: wrap;
        }
        .drag-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .drag-btn.edit-btn {
            color: #666;
            font-weight: 500;
        }
        .drag-btn.add-iti-btn {
            color: #2F80ED;
            font-weight: bold;
        }

        /* 標籤 */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-right: 6px;
            margin-top: 6px;
        }
        .tag-eat { background: #FFE5E5; color: #FF5A5A; }
        .tag-buy { background: #EAF9EE; color: #27AE60; }
        .tag-photo { background: #E8F4FF; color: #2F80ED; }
        .tag-cate { background: var(--primary-light); color: var(--primary); font-weight: bold;}

        /* 按鈕 */
        .btn-primary {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(255, 158, 102, 0.2);
            transition: 0.2s;
        }

        .btn-nav {
            background: #F2F2F7;
            color: var(--text-dark);
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }

        /* --- 行程分頁樣式 --- */
        .day-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .day-tab {
            padding: 8px 16px;
            background: var(--white);
            border-radius: 30px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            box-shadow: var(--shadow);
            border: 1px solid transparent;
            flex-shrink: 0;
        }
        .day-tab.active {
            background: var(--primary);
            color: var(--white);
        }

        .weather-info-box {
            background: var(--primary-light);
            border-radius: var(--radius-md);
            padding: 12px;
            margin-top: 12px;
            font-size: 13px;
            color: #C66A36;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 6px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            background: #F2F2F7;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* --- 購物卡片 --- */
        .shopping-card-body { display: flex; gap: 12px; align-items: center; }
        .shopping-info { flex: 1; }
        .shopping-img-box {
            width: 85px; height: 85px; background: #F2F2F7; border-radius: var(--radius-md);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; color: var(--text-muted); text-align: center; overflow: hidden;
            border: 1px solid #E5E5EA; flex-shrink: 0;
        }
        .shopping-img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 匯率 --- */
        .rate-display { display: flex; justify-content: space-between; background: #F8F9FA; padding: 12px; border-radius: var(--radius-md); margin-bottom: 16px; font-size: 14px; }
        .converter-group { margin-bottom: 12px; }
        .converter-group label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 4px; }
        .converter-input-wrap { position: relative; display: flex; align-items: center; }
